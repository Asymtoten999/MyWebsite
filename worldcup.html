word<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Simulator</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
        line-height: 1.6;
    }

    .container {
        max-width: 900px;
        margin: auto;
        padding: 2rem;
    }

    h1, h2 {
        color: #f8fafc;
    }

    .card {
        background: #1e293b;
        padding: 1.5rem;
        border-radius: 10px;
        margin-top: 1.5rem;
    }

    button {
        background: #38bdf8;
        border: none;
        padding: 0.7rem 1.2rem;
        border-radius: 6px;
        cursor: pointer;
        color: black;
        font-weight: bold;
    }

    button:hover {
        opacity: 0.9;
    }

    input {
        padding: 0.5rem;
        margin: 0.5rem 0;
        border-radius: 5px;
        border: none;
        width: 100px;
    }

    .result {
        margin-top: 1rem;
        font-size: 1.2rem;
    }

    a {
        color: #38bdf8;
        text-decoration: none;
    }
</style>
</head>

<body>

<div class="container">

    <h1>World Cup Match Simulator</h1>
    <p>Simulate match outcomes using simple probability models.</p>

    <a href="index.html">← Back</a>

    <div class="card">
        <h2>Team Strength</h2>

        <p>Enter attack strength (higher = better scoring chance):</p>

        <label>Team A:</label><br>
        <input id="teamA" type="number" value="1.2"><br>

        <label>Team B:</label><br>
        <input id="teamB" type="number" value="1.0"><br>

        <button onclick="simulate()">Simulate Match</button>

        <div class="result" id="result"></div>
    </div>

</div>

<script>
function poisson(lambda) {
    let L = Math.exp(-lambda);
    let k = 0;
    let p = 1;

    do {
        k++;
        p *= Math.random();
    } while (p > L);

    return k - 1;
}

function simulate() {
    let a = parseFloat(document.getElementById("teamA").value);
    let b = parseFloat(document.getElementById("teamB").value);

    let goalsA = poisson(a);
    let goalsB = poisson(b);

    let resultText = `Result: Team A ${goalsA} - ${goalsB} Team B`;

    if (goalsA > goalsB) resultText += " (Team A wins)";
    else if (goalsB > goalsA) resultText += " (Team B wins)";
    else resultText += " (Draw)";

    document.getElementById("result").innerText = resultText;
}
</script>

</body>
</html>
